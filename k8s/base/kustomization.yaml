apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: n184

resources:
  - namespace.yaml
  - rbac.yaml
  - redis.yaml
  - chromadb.yaml
  - memory-palace-pv.yaml
  # api-secrets.yaml is intentionally NOT applied here. setup.sh creates the
  # n184-api-keys Secret imperatively from .env; applying the empty template
  # via kustomize would wipe the real keys (incl. CLAUDE_CODE_OAUTH_TOKEN) on
  # every `kubectl apply -k`. The template file is kept for documentation.
  - providers-configmap.yaml
  - controller.yaml
  - honore.yaml
  - keda-vautrin.yaml
