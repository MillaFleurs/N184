# Template — values populated by k8s/setup.sh or kubectl create secret
apiVersion: v1
kind: Secret
metadata:
  name: n184-api-keys
  namespace: n184
  labels:
    app.kubernetes.io/part-of: n184
type: Opaque
stringData:
  # Required
  ANTHROPIC_API_KEY: ""
  # Multi-model swarm providers
  OPENAI_API_KEY: ""
  DEEPSEEK_API_KEY: ""
  GEMINI_API_KEY: ""
  # Messaging channels (enable by providing credentials)
  TELEGRAM_BOT_TOKEN: ""
  SLACK_BOT_TOKEN: ""
  SLACK_APP_TOKEN: ""
  EMAIL_IMAP_HOST: ""
  EMAIL_IMAP_USER: ""
  EMAIL_IMAP_PASS: ""
  EMAIL_SMTP_HOST: ""
  # TODO: Local LLM servers (Ollama, llama.cpp, MLX)
  # These use base URLs not API keys — will be ConfigMap entries:
  #   OLLAMA_BASE_URL: "http://ollama.n184.svc.cluster.local:11434"
  #   LLAMA_CPP_BASE_URL: "http://llamacpp.n184.svc.cluster.local:8080"
  #   MLX_BASE_URL: "http://mlx.n184.svc.cluster.local:8080"
