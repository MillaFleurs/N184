apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: vautrin-scaledjob
  namespace: n184
  labels:
    app.kubernetes.io/name: vautrin
    app.kubernetes.io/part-of: n184
spec:
  jobTargetRef:
    template:
      spec:
        nodeSelector:
          n184.io/palace-node: "true"
        restartPolicy: Never
        containers:
          - name: vautrin
            image: n184-agent:latest
            imagePullPolicy: IfNotPresent
            # Vautrin uses the queue consumer entrypoint (BRPOP)
            command: ["node", "/app/dist/vautrin-entrypoint.js"]
            env:
              - name: IPC_BACKEND
                value: "redis"
              - name: REDIS_URL
                value: "redis://redis.n184.svc.cluster.local:6379"
              - name: N184_AGENT_NAME
                value: "vautrin"
              - name: ANTHROPIC_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: n184-api-keys
                    key: ANTHROPIC_API_KEY
            volumeMounts:
              - name: soul
                mountPath: /workspace/group/CLAUDE.md
                subPath: CLAUDE.md
              - name: palace
                mountPath: /home/node/.n184
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "2Gi"
                cpu: "2"
        volumes:
          - name: soul
            configMap:
              name: n184-soul-vautrin
          - name: palace
            persistentVolumeClaim:
              claimName: n184-palace-pvc
    backoffLimit: 0
    activeDeadlineSeconds: 3600
    ttlSecondsAfterFinished: 300
  pollingInterval: 10
  minReplicaCount: 0
  maxReplicaCount: 1  # Start conservative (ChromaDB concurrency). Increase after adding ChromaDB server.
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  scalingStrategy:
    strategy: default
  triggers:
    - type: redis
      metadata:
        address: redis.n184.svc.cluster.local:6379
        listName: n184:vautrin-queue
        listLength: "1"
