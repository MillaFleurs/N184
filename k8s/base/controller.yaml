apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: n184
  labels:
    app.kubernetes.io/name: controller
    app.kubernetes.io/part-of: n184
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: controller
        app.kubernetes.io/part-of: n184
    spec:
      serviceAccountName: n184-controller
      containers:
        - name: controller
          image: n184-controller:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              value: "redis://redis.n184.svc.cluster.local:6379"
            - name: ASSISTANT_NAME
              value: "Honoré"
            - name: LOG_LEVEL
              value: "INFO"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n184-api-keys
                  key: TELEGRAM_BOT_TOKEN
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
