apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: n184
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/part-of: n184
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chromadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromadb
        app.kubernetes.io/part-of: n184
    spec:
      nodeSelector:
        n184.io/palace-node: "true"
      containers:
        - name: chromadb
          image: ghcr.io/chroma-core/chroma:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PERSIST_DIRECTORY
              value: "/chroma/chroma"
            - name: ALLOW_RESET
              value: "true"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chromadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: n184
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/part-of: n184
spec:
  selector:
    app.kubernetes.io/name: chromadb
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: n184-chromadb-pv
  labels:
    app.kubernetes.io/part-of: n184
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual-chromadb
  hostPath:
    path: /home/node/.n184/chromadb-server
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: n184.io/palace-node
              operator: In
              values: ["true"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-pvc
  namespace: n184
  labels:
    app.kubernetes.io/part-of: n184
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual-chromadb
  resources:
    requests:
      storage: 20Gi
