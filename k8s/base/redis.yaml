apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: n184
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: n184
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: n184
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: n184
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: n184
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - port: 6379
      targetPort: 6379
